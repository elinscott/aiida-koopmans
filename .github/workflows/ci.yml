name: ci

on:
  push:
    # only pushes to main trigger
    branches: [main]
  pull_request:
    # always triggered

jobs:

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.13', '3.12']
        aiida-version: ['stable']

    services:
      postgres:
        image: postgres:10
        env:
          POSTGRES_DB: test_aiida
          POSTGRES_PASSWORD: ''
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      rabbitmq:
        image: rabbitmq:latest
        ports:
          - 5672:5672

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Clone fork dependencies next to the checkout
      # The [tool.uv.sources] path dependencies point at sibling checkouts of
      # forks carrying features that are still working their way upstream.
      # Drop entries here (and the corresponding uv source) as they merge.
      run: |
        git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
        git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
        git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install project manager
      run: |
        pip install hatch
    - name: Run test suite
      env:
        PYTEST_ADDOPTS: "--durations=0"
      run: |
        hatch test --cover

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Clone fork dependencies next to the checkout
      run: |
        git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
        git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
        git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install project manager
      run: |
        pip install hatch
    - name: Build docs
      run: |
        hatch run docs:build

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install project manager
      run: |
        pip install hatch
    - name: Run formatter and linter
      run: |
        hatch fmt --check
    - name: Run pre-commit hooks
      run: |
        pipx run pre-commit run --all-files --show-diff-on-failure

  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Clone fork dependencies next to the checkout
      run: |
        git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
        git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
        git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install project manager
      run: |
        pip install hatch
    - name: Run static type checking
      run: |
        hatch run mypy:check
