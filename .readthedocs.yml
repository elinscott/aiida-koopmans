version: 2

sphinx:
  configuration: docs/source/conf.py

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

  # adapted from the uv recipe at
  # https://docs.readthedocs.io/en/stable/build-customization.html#install-dependencies-with-uv
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    # Clone the fork dependencies that [tool.uv.sources] points at as sibling
    # checkouts (mirrors the koopmans repo's RTD config — keep the lists in
    # sync with [tool.uv.sources], and drop entries as forks merge upstream).
    - git clone --depth 1 --branch patched https://github.com/elinscott/aiida-workgraph ../aiida-workgraph
    - git clone --depth 1 --branch patched https://github.com/elinscott/node-graph ../node-graph
    - git clone --depth 1 --branch patched https://github.com/elinscott/aiida-wannier90-workflows ../aiida-wannier90-workflows
    - uv venv $READTHEDOCS_VIRTUALENV_PATH
    - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH uv pip install ".[docs]"
    - python -m sphinx -T -W --keep-going -b html -d docs/_build/doctrees -D language=en docs/source $READTHEDOCS_OUTPUT/html
